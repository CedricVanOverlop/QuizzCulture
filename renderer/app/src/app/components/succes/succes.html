<div class="succes-container">
    <h1>Succès</h1>
    <button class="btn-retour" routerLink="/home">✕</button>

  <div class="header">
    <select
      class="joueur-select"
      [ngModel]="joueurSelectionne()"
      (ngModelChange)="onJoueurChange($event)">
      <option value="">— Tous les succès —</option>
      @for (joueur of joueurs(); track joueur.nom) {
        <option [value]="joueur.nom">{{ joueur.nom }}</option>
      }
    </select>
  </div>

  <div class="succes-grid">
    @for (s of succesAvecEtat(); track s.id) {
      <div class="succes-card"
           [class.debloque]="s.debloque === true"
           [class.verrouille]="s.debloque === false"
           (click)="ouvrirDetail(s)">
        <div class="succes-icon">
          {{ s.debloque === true ? '★' : s.debloque === false ? '☆' : '✦' }}
        </div>
        <div class="succes-info">
          <span class="succes-libelle">{{ s.libelle }}</span>
        </div>
      </div>
    }
  </div>

  @if (succesSelectionne() !== null) {
    <app-detail-succes
      [succes]="succesSelectionne()!"
      (fermer)="fermerDetail()" />
  }

</div>
